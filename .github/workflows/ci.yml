name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    # Im offiziellen Playwright-Container laufen (Browser + System-Fonts sind
    # fest eingebacken). Das macht die visuellen Regressionstests deterministisch:
    # Referenzbilder werden im *gleichen* Image erzeugt (siehe README).
    # Version muss zu @playwright/test in package.json passen.
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    steps:
      - uses: actions/checkout@v4
      # Node + npm sind im Image gebündelt; Browser liegen unter
      # PLAYWRIGHT_BROWSERS_PATH — kein `playwright install` nötig.
      - run: npm ci
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      # Bei visuellen Abweichungen legt Playwright expected/actual/diff-PNGs
      # unter test-results/ ab — zum Anschauen im Run.
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-diffs
          path: test-results/
          retention-days: 7
