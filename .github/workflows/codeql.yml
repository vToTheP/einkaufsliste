name: CodeQL

# Statische Code-Analyse (GitHub-Standard). Public Repo = kostenlos.
# Läuft bei jedem PR gegen main sowie wöchentlich als Baseline-Scan.
# Kein push-auf-main-Trigger: Der Commit wurde im PR bereits analysiert; der
# schedule-Lauf hält zusätzlich die Baseline aktuell.
on:
  pull_request:
    branches: [main]
  schedule:
    # Montags 06:17 UTC — feste, aber nicht runde Minute (weniger Runner-Contention).
    - cron: "17 6 * * 1"

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: CodeQL initialisieren
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: CodeQL-Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
