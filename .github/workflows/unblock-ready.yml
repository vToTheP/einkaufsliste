name: Unblock ready issues

# Hebt status:blocked-Issues auf status:ready, sobald sie tatsächlich frei sind:
#   1. Ein Issue wird geschlossen (u.a. gemergter PR mit "Closes #N") → alle davon
#      abhängigen Issues freischalten, sobald ALLE ihre Blocker geschlossen sind.
#   2. Ein Issue wird angelegt/neu gelabelt → falls sein "## Blocked by"-Abschnitt
#      explizit KEINE #N-Referenz enthält (z.B. "Keine"), wurde es fälschlich als
#      status:blocked angelegt und wird direkt auf status:ready gehoben. Ohne den
#      opened/labeled-Trigger würde bei null ready-Issues nie ein closed-Event
#      feuern → die Nacht-Fabrik bliebe im Deadlock (siehe #100).
# So verhungert die Nacht-Fabrik nicht (Baustein 3 aus #53: Nachschub-Automatik).

on:
  issues:
    types: [closed, opened, labeled]

permissions:
  issues: write

jobs:
  unblock:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Abhängige Issues freischalten
        run: |
          set -euo pipefail

          # Alle offenen, blockierten Issues holen.
          blocked=$(gh issue list --repo "$REPO" --state open \
            --label status:blocked --json number,body,labels --limit 200)

          echo "$blocked" | jq -c '.[]' | while read -r issue; do
            num=$(echo "$issue" | jq -r '.number')

            # triage-Guard: KI-erstellte Issues nie automatisch auf ready heben
            # (CLAUDE.md — Issue-Auswahl & Labels).
            if echo "$issue" | jq -e '.labels[] | select(.name == "triage")' >/dev/null; then
              echo "#$num: triage-Label → übersprungen."
              continue
            fi

            # Blocker-Nummern aus dem "## Blocked by"-Abschnitt lesen: alle "#<zahl>"-
            # Referenzen zwischen der Überschrift und der nächsten "##"-Überschrift.
            body=$(echo "$issue" | jq -r '.body // ""')
            section=$(printf '%s\n' "$body" \
              | awk 'tolower($0) ~ /^##+[[:space:]]*blocked by/ {f=1; next} /^##/ {f=0} f')
            has_section=$(printf '%s\n' "$body" \
              | awk 'tolower($0) ~ /^##+[[:space:]]*blocked by/ {print "yes"; exit}')
            blockers=$(printf '%s\n' "$section" \
              | grep -oE '#[0-9]+' | tr -d '#' | sort -u || true)

            if [ -z "$blockers" ]; then
              # Kein "## Blocked by"-Abschnitt → ohne belastbare Info im Zweifel
              # blockiert lassen. Abschnitt vorhanden, aber ohne #N-Referenz
              # (z.B. "Keine") → das Issue wurde fälschlich blockiert angelegt
              # und wird aktiv freigeschaltet (#100).
              if [ -n "$has_section" ]; then
                echo "#$num: '## Blocked by' ohne #N-Referenz → fälschlich blockiert, status:ready."
                gh issue edit "$num" --repo "$REPO" \
                  --remove-label status:blocked --add-label status:ready
              else
                echo "#$num: kein '## Blocked by'-Abschnitt → übersprungen (bleibt status:blocked)."
              fi
              continue
            fi

            # Sind alle Blocker geschlossen? Unbekannter/fehlender Status zählt als offen
            # (sicherer Default: im Zweifel blockiert lassen).
            all_closed=true
            for b in $blockers; do
              state=$(gh issue view "$b" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              echo "#$num blocked by #$b → $state"
              if [ "$state" != "CLOSED" ]; then
                all_closed=false
              fi
            done

            if [ "$all_closed" = true ]; then
              echo "#$num: alle Blocker geschlossen → status:ready."
              gh issue edit "$num" --repo "$REPO" \
                --remove-label status:blocked --add-label status:ready
            else
              echo "#$num: noch offene Blocker → bleibt status:blocked."
            fi
          done
