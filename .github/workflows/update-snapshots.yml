name: Update visual snapshots

# Regeneriert die visuellen Playwright-Baselines im GLEICHEN Container wie die
# e2e-CI und committet sie zurück auf den Ziel-Branch. Nötig, weil intendierte
# UI-Änderungen die Baselines brechen und diese nur im chromium-linux-Container
# deterministisch erzeugbar sind (nicht lokal auf Windows / in der Cloud-Session).
#
# Zwei Auslöser:
#   1. Label `update-snapshots` an einen PR hängen (Regelfall) — die Fabrik setzt
#      es beim Öffnen eines PRs mit sichtbarer UI-Änderung automatisch. Der Ziel-
#      Branch ist dann der PR-Head-Branch; nach erfolgreicher Regenerierung wird
#      das Label wieder entfernt (das Signal ist verbraucht).
#   2. Manuell: Actions → "Update visual snapshots" → Branch angeben (Fallback,
#      z.B. für Branches ohne offenen PR).
#
# WICHTIG: Der Push nutzt das Secret SNAPSHOT_PUSH_TOKEN (Fine-grained PAT,
# Contents: Read/Write). Ein Push mit dem Standard-GITHUB_TOKEN würde KEINE
# erneute CI auslösen — dann bliebe der e2e-Check rot/pending. Ohne das Secret
# committet der Workflow trotzdem, warnt aber, dass die CI manuell neu laufen muss.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, dessen visuelle Baselines aktualisiert werden sollen"
        required: true
        type: string
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    # Manueller Dispatch läuft immer; der Label-Pfad nur, wenn GENAU das
    # `update-snapshots`-Label angehängt wurde (andere Labels triggern nichts).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'update-snapshots'
    runs-on: ubuntu-latest
    # Gleiches Image wie der e2e-Job in ci.yml → Baselines sind deterministisch.
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
    env:
      # Ziel-Branch je Auslöser: Dispatch → Input, Label → PR-Head-Branch.
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.head_ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.head_ref }}
          # PAT bevorzugen, damit der spätere Push die CI erneut triggert.
          # Fällt auf GITHUB_TOKEN zurück, falls das Secret (noch) fehlt.
          token: ${{ secrets.SNAPSHOT_PUSH_TOKEN || github.token }}
      - run: npm ci
      # Wie im e2e-Job von ci.yml: die zur installierten @playwright/test-Version
      # passende Chromium-Revision nachziehen. Ohne diesen Schritt schlägt der
      # Browser-Start nach einem Playwright-Bump fehl ("Executable doesn't exist"),
      # weil die im Image vorinstallierte Revision veraltet — dann werden nie
      # Baselines erzeugt und der e2e-Check des Ziel-Branch bleibt rot.
      - run: npx playwright install chromium
      - run: npm run build
      # --update-snapshots schreibt die neuen Baselines und beendet grün.
      - run: npm run test:e2e -- --update-snapshots
      - name: Aktualisierte Baselines committen
        env:
          # Nur ein Boolean im Log — der PAT selbst wird nicht in die Shell interpoliert.
          HAS_PAT: ${{ secrets.SNAPSHOT_PUSH_TOKEN != '' }}
        run: |
          # Der Playwright-Container hat kein bash in PATH → GitHub nutzt sh (dash).
          # dash kennt kein "set -o pipefail"; das Skript hat ohnehin keine Pipes.
          set -eu
          # Container läuft als root über gemountetem Workspace → safe.directory nötig.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- e2e)" ]; then
            echo "Keine Snapshot-Änderungen — nichts zu committen."
            exit 0
          fi

          git add e2e
          git commit -m "test: visuelle Baselines aktualisiert (${{ github.event_name }})"
          git push origin "HEAD:$TARGET_BRANCH"

          if [ "$HAS_PAT" != "true" ]; then
            echo "::warning::Ohne SNAPSHOT_PUSH_TOKEN löst der Push keine CI aus — e2e des PR bitte manuell neu starten (Re-run) oder Secret anlegen."
          fi
      # Nur im Label-Pfad: das verbrauchte Signal-Label wieder abnehmen, damit eine
      # spätere erneute UI-Änderung es neu setzen und den Lauf erneut auslösen kann
      # (`labeled` feuert nur beim Anhängen). Läuft nur, wenn die Regenerierung oben
      # erfolgreich war — schlägt sie fehl, bleibt das Label als sichtbares Signal.
      - name: Verbrauchtes update-snapshots-Label entfernen
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'update-snapshots',
            })
